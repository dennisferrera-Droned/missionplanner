name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/android-app/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger a build manually from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1 — Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 — Set up JDK 17 (required by AGP 8)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3 — Cache Gradle home and wrapper so subsequent builds are fast
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android-app/**/*.gradle*', 'mobile/android-app/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 4 — Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x mobile/android-app/gradlew

      # 5 — Validate Gradle wrapper
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      # 6 — Build debug APK (no signing required — debug key is auto-generated)
      - name: Build debug APK
        working-directory: mobile/android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 7 — Upload APK as a build artifact (available under Actions → your run → Artifacts)
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DJI-Photogrammetry-debug-${{ github.run_number }}
          path: mobile/android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # -----------------------------------------------------------------------
  # Release job — runs only when you push a tag like v1.0.0
  # Creates a GitHub Release and attaches the APK automatically
  # -----------------------------------------------------------------------
  release:
    name: Create GitHub Release with APK
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android-app/**/*.gradle*', 'mobile/android-app/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x mobile/android-app/gradlew

      - name: Build release APK
        working-directory: mobile/android-app
        run: ./gradlew assembleRelease --no-daemon

      # Rename the APK to include the tag version
      - name: Rename APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv mobile/android-app/app/build/outputs/apk/release/app-release-unsigned.apk \
             mobile/android-app/app/build/outputs/apk/release/DJI-Photogrammetry-${TAG}.apk || \
          mv mobile/android-app/app/build/outputs/apk/release/*.apk \
             mobile/android-app/app/build/outputs/apk/release/DJI-Photogrammetry-${TAG}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DJI Photogrammetry ${{ github.ref_name }}
          body: |
            ## DJI Photogrammetry ${{ github.ref_name }}

            ### Installation
            1. Download `DJI-Photogrammetry-*.apk` below
            2. On your Android phone: **Settings → Security → Install unknown apps** → allow your browser or Files app
            3. Open the downloaded APK and tap **Install**

            ### What's included
            - Mission Planner: Grid, Double-Grid, Oblique, Perimeter, Spiral patterns
            - Drone profiles: Mini 3, Mini 3 Pro, Mini 4 Pro, Mavic 3 Classic, Phantom 4 RTK
            - Live GSD and photo-interval preview
            - Export: JSON + KML
            - Route Follow Mode with pace-match and backwards-flight export

            ### Requirements
            - Android 8.0+ (API 26)
            - ~10 MB storage
          files: mobile/android-app/app/build/outputs/apk/release/DJI-Photogrammetry-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
